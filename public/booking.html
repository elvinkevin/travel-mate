<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Trip - TravelMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. Full-screen Safari Background */
        body {
            background-image: url('https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=2000');
            /* High-res safari landscape */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }


        .floating-card {
            max-width: 800px;
            margin: 50px auto;
            background-color: rgba(255, 255, 255, 0.55);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .floating-card h5 {
            padding-top: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body class="bg-light" style="background-color: #d1e0ec !important;">
     <nav class="navbar navbar-expand-lg bg-secondary bg-gradient sticky-top bg-opacity-75 navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-light" href="#homepage" aria-label="Go to homepage">TravelMate</a>
            <button class="navbar-toggler" type="button" aria-label="Toggle navigation" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav me-3">
                    <li class="nav-item">
                        <a class="nav-link active" href="#homepage" aria-label="Go to homepage">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#aboutus" aria-label="Go to about us">About</a>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#tours" aria-label="Go to tours">Tours</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contactus" aria-label="Go to contact us">Contacts</a>
                    </li>
                </ul>
                <button type="button" aria-label="Toggle subscription" class="btn btn-outline-light">
                    Subscribe <i class="fa-regular fa-bell ms-1"></i>
                </button>
            </div>
        </div>
    </nav>
    <header>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <h2 class="text-center mb-4 text-white text-shadow">Finalize Your Journey with TravelMate</h2>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container mb-5">
            <div class="card floating-card">
                <h5 class="card-title text-primary text-center">Please complete the form below.</h5>
                <p class="text-muted small text-center">Your registration will be verified prior to your arrival.</p>
                <hr>

                <form id="customBookingForm" class="p-3">
                    <div class="row justify-content-center">
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">First Name</label>
                            <input type="text" id="firstName" class="form-control" placeholder="Jane" required>
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Last Name</label>
                            <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" id="userEmail" class="form-control" placeholder="name@example.com"
                                required>
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="tel" id="phonenumber" class="form-control" placeholder="+254..." required>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-7 mb-3">
                            <label class="form-label fw-bold">Street Address</label>
                            <input type="text" id="address" class="form-control" placeholder="123 Main St" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Postal Code</label>
                            <input type="text" id="postalCode" class="form-control" placeholder="Code" required>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Departure Date</label>
                            <input type="date" id="departure" class="form-control" required>
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">Number of Adults</label>
                            <input type="number" id="numberofadults" class="form-control" min="1" placeholder="1"
                                required>
                        </div>
                    </div>

                    <div class="row justify-content-center mb-3">
                        <div class="col-md-10">
                            <h5 class="fw-bold">Payment Method</h5>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="paypal"
                                        value="paypal" checked>
                                    <label class="form-check-label" for="paypal">Paypal</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="mpesa"
                                        value="mpesa">
                                    <label class="form-check-label" for="mpesa">Mpesa</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-10 mb-3">
                            <label for="specialRequests" class="form-label fw-bold">Special Requests</label>
                            <address>
                                <textarea class="form-control" id="specialRequests" rows="3"
                                    placeholder="Any dietary needs or accessibility requests?"></textarea>
                            </address>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-10 d-grid">
                            <button type="submit" aria-label="Confirm booking" class="btn btn-primary btn-lg">Confirm Booking</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
        </div>
    </main>
    <script type="module" src="bookings.js"></script>
</body>

</html>
