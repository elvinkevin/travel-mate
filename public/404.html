<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | TravelMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #fcfcfc;
            font-family: 'Segoe UI', sans-serif;
        }

        .error-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            margin-top: 100px;
        }

        .icon-box {
            font-size: 70px;
            color: #ffc107;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #adb5bd;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-secondary bg-gradient sticky-top bg-opacity-75 navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-light" href="#homepage">TravelMate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav me-3">
                    <li class="nav-item">
                        <a class="nav-link active" href="#homepage">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#aboutus">About</a>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#tours">Tours</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contactus">Contacts</a>
                    </li>
                </ul>
                <button type="button" class="btn btn-outline-light">
                    Subscribe <i class="fa-regular fa-bell ms-1"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card error-card text-center p-5">
                    <div class="card-body">
                        <div class="icon-box">
                            <i class="fa-solid fa-map-location-dot"></i>
                        </div>
                        <div class="error-code text-uppercase">Error 404</div>
                        <h2 class="fw-bold my-3">Lost in Transit?</h2>
                        <p class="text-muted mb-4">
                            We couldn't find the page you're looking for. It might have moved, or the link has expired.
                        </p>

                        <div class="d-grid gap-2">
                            <a href="index.html" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                Back to Base
                            </a>
                            <button onclick="history.back()" class="btn btn-link text-decoration-none text-muted">
                                <i class="fa-solid fa-arrow-left me-2"></i>Go Back
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
