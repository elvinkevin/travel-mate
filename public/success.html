<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | TravelMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .success-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-top: 80px;
            background: #ffffff;
        }
        .icon-circle {
            width: 100px;
            height: 100px;
            background-color: #d1e7dd;
            color: #0f5132;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 50px;
        }
        .ref-box {
            background-color: #f8f9fa;
            border: 1px dashed #dee2e6;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            color: #212529;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card success-card text-center p-5">
                    <div class="card-body">
                        <div class="icon-circle">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        
                        <h2 class="fw-bold mb-3">Booking Confirmed</h2>
                        <p class="text-muted mb-4">
                            Your trip has been successfully scheduled. A secure confirmation has been sent to your email.
                        </p>

                        <div class="mb-4">
                            <small class="text-uppercase fw-bold text-muted d-block mb-1" style="font-size: 0.7rem;">Reference ID</small>
                            <div class="ref-box" id="refId">Verifying...</div>
                        </div>
                        
                        <a href="index.html" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                            Return to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <script>
    const refDisplay = document.getElementById('refId');
    
    // 1. Try to grab the ID from Session Storage
    const sessionID = sessionStorage.getItem('validBookingId');

    console.log("Session Audit - Retreived ID:", sessionID);

    if (sessionID) {
        // 2. Success: Display the ID
        refDisplay.innerText = sessionID;
        
        // OPTIONAL: Clear it immediately so a page refresh kills the access
        // sessionStorage.removeItem('validBookingId'); 
        
    } else {
        // 3. Failure: No session data means they didn't just come from the booking page
        console.error("Security Violation: No session token found.");
        
        document.querySelector('.success-card').style.display = 'none';
        
        alert("Access Denied: Booking session expired or invalid.");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
